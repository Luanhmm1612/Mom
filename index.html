<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gửi Mẹ</title>

<style>
* {
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  margin: 0;
  height: 100vh;
  background: #cfefff;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* HOA BAY */
.flower {
  position: absolute;
  font-size: 26px;
  animation: float 10s linear infinite;
  opacity: 0.7;
}

@keyframes float {
  0% {
    transform: translateY(110vh);
    opacity: 1;
  }
  100% {
    transform: translateY(-10vh);
    opacity: 0;
  }
}

/* BAO THƯ */
.wrapper {
  position: relative;
}

.envelope {
  width: 460px;
  height: 280px;
  background: #f2a0b7;
  border: 4px solid #e07b9b;
  border-radius: 12px;
  position: relative;
  cursor: pointer;
  transform: rotate(-3deg);
  box-shadow: 0 15px 30px rgba(0,0,0,0.15);
}

.envelope::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  border-left: 230px solid transparent;
  border-right: 230px solid transparent;
  border-top: 150px solid #f7b8c9;
  transform-origin: top;
  transition: 0.8s;
}

.envelope.open::before {
  transform: rotateX(180deg);
}

.envelope-text {
  position: absolute;
  bottom: 20px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 22px;
  font-weight: 600;
}

/* THƯ */
.letter {
  position: absolute;
  width: 640px;
  height: 360px;
  background: white;
  border-radius: 14px;
  top: 40px;
  left: -90px;
  display: flex;
  padding: 24px;
  gap: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
  opacity: 0;
  transform: translateY(60px) scale(0.9);
  transition: 0.8s;
}

.envelope.open + .letter {
  opacity: 1;
  transform: translateY(-130px) scale(1);
}

.letter img {
  width: 45%;
  border-radius: 12px;
  object-fit: cover;
}

/* TEXT */
.text {
  width: 55%;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.text h1 {
  font-size: 34px;
  color: #c85c7e;
  text-align: center;
  margin-bottom: 16px;
}

.text p {
  font-size: 20px;
  line-height: 1.6;
  color: #333;
}
</style>
</head>

<body>

<!-- HOA BAY -->
<script>
const flowers = ["🌼","🌷","🌸"];

for (let i = 0; i < 20; i++) {
  const f = document.createElement("div");
  f.className = "flower";
  f.innerHTML = flowers[Math.floor(Math.random()*flowers.length)];
  f.style.left = Math.random()*100 + "vw";
  f.style.animationDuration = (Math.random()*4 + 8) + "s";
  f.style.animationDelay = Math.random()*5 + "s";
  document.body.appendChild(f);
}
</script>

<!-- NHẠC -->
<audio id="music" loop>
  <source src="nhac.mp3" type="audio/mpeg">
</audio>

<div class="wrapper">
  <div class="envelope" onclick="openLetter()">
    <div class="envelope-text">Gửi mẹ 🌼</div>
  </div>

  <div class="letter">
    <img src="banh.png">
    <div class="text">
      <h1>Gửi mẹ</h1>
      <p>
        祝妈妈幸福<br><br>
        妈妈，谢谢您为我做的一切。<br><br>
        Mẹ giữ gìn sức khỏe.
      </p>
    </div>
  </div>
</div>

<script>
let opened = false;
function openLetter() {
  if (opened) return;
  opened = true;
  document.querySelector(".envelope").classList.add("open");
  document.getElementById("music").play();
}
</script>

</body>
</html>
